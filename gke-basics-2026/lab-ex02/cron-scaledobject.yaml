apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: keda-pubsub-cron
  namespace: keda-pubsub
spec:
  maxReplicaCount: 5
  minReplicaCount: 0
  pollingInterval: 10
  cooldownPeriod: 60
  scaleTargetRef:
    name: keda-pubsub
  triggers:
    - type: gcp-pubsub
      authenticationRef:
        name: keda-auth
      metadata:
        subscriptionName: "projects/PROJECT_ID/subscriptions/keda-echo-read"
    - type: cron
      metadata:
        timezone: "Asia/Tokyo"
        start: "CRON_START"
        end: "CRON_END"
        desiredReplicas: "3"
